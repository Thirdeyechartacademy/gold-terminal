<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>THIRDEYECHART — Gold Decomposition Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04050a; --panel:rgba(8,10,16,0.97); --line:rgba(255,255,255,0.06);
    --gold:#f5c451; --green:#2fdd9a; --red:#f64d6e; --blue:#5b8def; --teal:#43c9b0; --violet:#8a7bd8;
    --txt:#e9edf5; --dim:#7a8499; --faint:#454d61;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#000;}
  body{font-family:'Space Grotesk',system-ui,sans-serif;color:var(--txt);position:relative;}
  .vign{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);}

  .topbar{position:fixed;top:0;left:0;right:0;height:46px;z-index:20;display:flex;align-items:center;gap:12px;padding:0 16px;
    background:linear-gradient(180deg,rgba(4,5,10,0.96),rgba(4,5,10,0.35));border-bottom:1px solid var(--line);backdrop-filter:blur(12px);}
  .brand{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:2.5px;color:var(--gold);display:flex;align-items:center;gap:7px;}
  .brand span{color:var(--faint);font-weight:400;}
  .tag{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--faint);border:1px solid var(--line);padding:3px 7px;border-radius:3px;text-transform:uppercase;}
  .viewtog{display:flex;gap:2px;background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:6px;padding:2px;margin-left:auto;}
  .vbtn{font-family:var(--mono);font-size:9px;letter-spacing:1.2px;color:var(--dim);background:transparent;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all .18s;}
  .vbtn.active{background:rgba(245,196,81,0.14);color:var(--gold);}
  .vbtn:hover:not(.active){color:var(--txt);}
  .live{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--green);}
  .live .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.8s infinite;}
  .clock{font-family:var(--mono);font-size:10px;color:var(--dim);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .stage{position:fixed;inset:46px 0 0 0;z-index:5;display:flex;}
  .graph-wrap{flex:1;position:relative;overflow:hidden;}
  #graph{width:100%;height:100%;display:block;touch-action:none;}

  /* verdict banner (top-left overlay) */
  .concl{position:absolute;left:16px;top:14px;max-width:min(430px,calc(100% - 32px));z-index:7;background:rgba(8,10,16,0.84);border:1px solid var(--line);border-radius:12px;padding:12px 15px;backdrop-filter:blur(14px);box-shadow:0 8px 30px rgba(0,0,0,0.5);}
  .concl-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap;}
  .concl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .concl-verdict{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:0.4px;}
  .concl-conf{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--dim);}
  .concl-text{font-size:12px;line-height:1.55;color:var(--dim);}
  .concl-text b{color:var(--txt);font-weight:600;}
  .concl-cause{font-family:var(--mono);font-size:9.5px;line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);color:var(--dim);display:none;}
  .concl-cause b{font-weight:700;}
  @media(max-width:900px){ .concl{left:10px;top:10px;max-width:calc(100% - 20px);} }

  /* decomposition banner (top-right overlay) */
  .decomp{position:absolute;right:16px;top:14px;width:min(300px,calc(100% - 32px));z-index:7;background:rgba(8,10,16,0.84);border:1px solid var(--line);border-radius:12px;padding:12px 14px;backdrop-filter:blur(14px);box-shadow:0 8px 30px rgba(0,0,0,0.5);}
  .decomp-h{font-family:var(--mono);font-size:8.5px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;margin-bottom:9px;}
  .decomp-eq{display:flex;align-items:stretch;gap:6px;}
  .dcell{flex:1;text-align:center;}
  .dcell .k{font-family:var(--mono);font-size:8px;letter-spacing:0.5px;color:var(--dim);text-transform:uppercase;margin-bottom:3px;}
  .dcell .v{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1;}
  .dcell .z{font-family:var(--mono);font-size:7.5px;color:var(--faint);margin-top:3px;}
  .dop{display:flex;align-items:center;font-family:var(--mono);font-size:13px;color:var(--faint);font-weight:700;}
  .decomp-s{font-size:11px;line-height:1.5;color:var(--dim);margin-top:10px;padding-top:9px;border-top:1px solid var(--line);}
  .decomp-s b{font-weight:700;}
  @media(max-width:900px){ .decomp{display:none;} }

  /* right panel */
  .panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--line);backdrop-filter:blur(16px);display:flex;flex-direction:column;overflow-y:auto;}
  .panel::-webkit-scrollbar{width:0;}
  .p-gold{padding:16px 16px 12px;border-bottom:1px solid var(--line);}
  .p-gold .lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;margin-bottom:5px;}
  .p-gold .row{display:flex;align-items:baseline;gap:8px;}
  .p-gold .px{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--gold);text-shadow:0 0 12px rgba(245,196,81,0.3);}
  .p-gold .chg{font-family:var(--mono);font-size:13px;font-weight:500;}
  .p-gold .g{font-family:var(--mono);font-size:9px;color:var(--faint);margin-left:auto;align-self:center;}

  .sec{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;padding:13px 16px 6px;display:flex;justify-content:space-between;align-items:center;}
  .sec .h{font-size:8px;color:var(--faint);letter-spacing:0.5px;text-transform:none;}
  .layer-h{font-family:var(--mono);font-size:8px;letter-spacing:1px;padding:8px 16px 3px;text-transform:uppercase;display:flex;align-items:center;gap:7px;font-weight:700;}
  .layer-h .n{width:15px;height:15px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
  .drow{display:flex;align-items:center;gap:9px;padding:6px 16px;cursor:pointer;transition:background .15s;}
  .drow:hover{background:rgba(255,255,255,0.03);}
  .drow.sel{background:rgba(245,196,81,0.07);}
  .ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dname{font-size:12px;font-weight:500;line-height:1.15;}
  .dname small{display:block;font-family:var(--mono);font-size:7.5px;color:var(--faint);letter-spacing:0.3px;margin-top:1px;}
  .dval{margin-left:auto;font-family:var(--mono);font-size:11px;text-align:right;}
  .dval small{display:block;font-size:8px;color:var(--dim);margin-top:1px;}

  .quality{padding:6px 16px 4px;}
  .qrow{display:flex;align-items:center;gap:8px;padding:4px 0;font-family:var(--mono);font-size:10px;}
  .qdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .qname{color:var(--dim);}
  .qstat{margin-left:auto;}
  .qverdict{margin:8px 16px 4px;padding-top:9px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;line-height:1.5;display:flex;gap:7px;align-items:flex-start;}

  .sparkwrap{margin:12px 16px 16px;background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:10px;padding:10px 12px 6px;}
  .sph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .sph .l{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;}
  .sph .r{font-family:var(--mono);font-size:8px;color:var(--dim);}
  #spark{width:100%;height:44px;display:block;}

  .tooltip{position:fixed;z-index:30;pointer-events:none;background:rgba(7,9,15,0.96);border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-family:var(--mono);font-size:11px;opacity:0;transition:opacity .14s;backdrop-filter:blur(8px);box-shadow:0 10px 36px rgba(0,0,0,0.55);max-width:240px;}
  .tt-name{font-weight:700;font-size:12px;margin-bottom:5px;font-family:'Space Grotesk',sans-serif;}
  .tt-row{color:var(--dim);margin-top:3px;display:flex;justify-content:space-between;gap:14px;}
  .tt-row b{color:var(--txt);font-weight:500;}
  .tt-why{margin-top:7px;padding-top:7px;border-top:1px solid var(--line);color:var(--dim);font-size:10px;line-height:1.5;font-family:'Space Grotesk',sans-serif;}

  .mobtog{display:none;}
  @media(max-width:900px){
    .panel{position:fixed;top:46px;bottom:0;right:0;width:min(90vw,320px);transform:translateX(100%);transition:transform .32s cubic-bezier(.3,.9,.3,1);z-index:25;box-shadow:-20px 0 60px rgba(0,0,0,0.55);}
    .panel.open{transform:translateX(0);}
    .mobtog{display:flex;position:fixed;z-index:26;bottom:20px;right:16px;width:44px;height:44px;border-radius:13px;align-items:center;justify-content:center;cursor:pointer;color:var(--gold);background:rgba(10,13,20,0.82);border:1px solid rgba(245,196,81,0.28);backdrop-filter:blur(12px);box-shadow:0 6px 22px rgba(0,0,0,0.5);}
    .mobtog:active{transform:scale(0.9);}
  }
  @media(max-width:480px){ .tag{display:none;} .clock{display:none;} .vbtn{padding:4px 9px;} }
</style>
</head>
<body>
  <div class="vign"></div>

  <div class="topbar">
    <div class="brand">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="#f5c451" stroke-width="1.4"/><circle cx="12" cy="12" r="3" fill="#f5c451"/></svg>
      THIRDEYE<span>CHART</span>
    </div>
    <div class="tag">Gold Decomposition Engine · r=g−f$</div>
    <div class="viewtog">
      <button class="vbtn active" id="vbNet">NETWORK</button>
      <button class="vbtn" id="vbGlobe">GLOBE</button>
    </div>
    <div class="live"><span class="dot"></span><span id="status">menyambung…</span></div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="stage">
    <div class="graph-wrap">
      <canvas id="graph"></canvas>

      <div class="concl" id="concl">
        <div class="concl-top">
          <span class="concl-dot" id="cDot"></span>
          <span class="concl-verdict" id="cVerdict">—</span>
          <span class="concl-conf" id="cConf">—</span>
        </div>
        <div class="concl-text" id="cText">Mengira penguraian…</div>
        <div class="concl-cause" id="cCause"></div>
      </div>

      <div class="decomp" id="decompBanner">
        <div class="decomp-h">Penguraian gerakan gold (bp)</div>
        <div class="decomp-eq">
          <div class="dcell"><div class="k">r(XAU)</div><div class="v" id="eRx">—</div><div class="z" id="eRxz">&nbsp;</div></div>
          <div class="dop">=</div>
          <div class="dcell"><div class="k" style="color:var(--gold)">g</div><div class="v" id="eG" style="color:var(--gold)">—</div><div class="z" id="eGz">&nbsp;</div></div>
          <div class="dop">−</div>
          <div class="dcell"><div class="k">f$</div><div class="v" id="eF">—</div><div class="z" id="eFz">&nbsp;</div></div>
        </div>
        <div class="decomp-s" id="eSentence">Menunggu data…</div>
      </div>

      <div class="tooltip" id="tooltip"></div>
    </div>

    <aside class="panel" id="panel">
      <div class="p-gold">
        <div class="lbl">Gold spot · live</div>
        <div class="row"><span class="px" id="gPrice">—</span><span class="chg" id="gChg">—</span><span class="g" id="gAge">—</span></div>
      </div>

      <div class="sec">Hierarki pemacu <span class="h">cause → gold</span></div>
      <div id="drivers"></div>

      <div class="sec">Kualiti data</div>
      <div class="quality" id="qList"></div>
      <div class="qverdict" id="qVerdict"><span class="qdot" style="background:var(--faint);margin-top:3px"></span><span style="color:var(--dim)">Menunggu sumber…</span></div>

      <div class="sparkwrap">
        <div class="sph"><span class="l">Aliran g sesi (z gold-sendiri)</span><span class="r" id="sparkNote">—</span></div>
        <canvas id="spark"></canvas>
      </div>
    </aside>
  </div>

  <button class="mobtog" id="mobtog" aria-label="Panel">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="5" y1="8" x2="19" y2="8"/><line x1="5" y1="12" x2="14" y2="12"/><line x1="5" y1="16" x2="17" y2="16"/></svg>
  </button>

<script>
"use strict";
// ════════════════════════════════════════════════════════════════════
//  GOLD DECOMPOSITION ENGINE — visual layer
//  Identity: r(XAUUSD) = g - f_USD  ·  g = r_XAU + f_USD (dollar removed)
//  Nodes are GOLD-RELEVANT ONLY, arranged by causal layer:
//    CAUSE (real yield) -> TRANSMISSION (USD, built from currencies)
//    -> gold-specific g -> price ; silver confirms.
// ════════════════════════════════════════════════════════════════════

const YF   = 'https://query1.finance.yahoo.com/v8/finance/chart/';
const GAPI = 'https://api.gold-api.com/price/';
const PROXIES = [
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
];
// paste your FRED key OR (better) your Cloudflare Worker URL in GATEWAY
const FRED_KEY = 'PASTE_YOUR_FREE_FRED_KEY_HERE';
const RY_CONFIGURED = !!FRED_KEY && FRED_KEY.indexOf('PASTE_') !== 0;
const GATEWAY = ''; // e.g. 'https://gold-gateway.YOURNAME.workers.dev'
const RY_ON = !!GATEWAY || RY_CONFIGURED;
const fredUrl = s => 'https://api.stlouisfed.org/fred/series/observations?series_id='+s+'&api_key='+FRED_KEY+'&file_type=json&sort_order=desc&limit=12';

const FX = [
  { sym:'EURUSD=X', ccy:'EUR', usdSign:-1, geo:[50,9]   },
  { sym:'GBPUSD=X', ccy:'GBP', usdSign:-1, geo:[51,0]   },
  { sym:'AUDUSD=X', ccy:'AUD', usdSign:-1, geo:[-33,151]},
  { sym:'NZDUSD=X', ccy:'NZD', usdSign:-1, geo:[-41,175]},
  { sym:'JPY=X',    ccy:'JPY', usdSign:+1, geo:[36,138] },
  { sym:'CHF=X',    ccy:'CHF', usdSign:+1, geo:[47,8]   },
  { sym:'CAD=X',    ccy:'CAD', usdSign:+1, geo:[45,-75] },
];
const N_CCY = 8;
const VOL = { g:0.009, xau:0.009, xag:0.016, fusd:0.0030, ry:0.030, tnx:0.020 };

// primary driver nodes (gold-relevant), by causal layer
const LAYER = { 1:{name:'CAUSE',col:'#f5c451'}, 2:{name:'TRANSMISSION',col:'#5b8def'}, 3:{name:'CONFIRM',col:'#43c9b0'} };
const PRIMARY = [
  { id:'RY',  name:'Real Yield', sym:'DFII10',  layer:1, base:1.00, geo:[38,-97],
    why:'Kos peluang pegang gold. Real yield turun = tailwind gold; naik = headwind. Pemacu #1 paling konsisten.' },
  { id:'USD', name:'US Dollar',  sym:'f$ bakul', layer:2, base:0.82, geo:[38,-97],
    why:'Faktor dollar dari bakul 7 mata wang. USD kuat = gold tertekan. Dibina dari currencies yang mengorbit.' },
  { id:'Y10', name:'10Y Yield',  sym:'^TNX',     layer:2, base:0.42, geo:[38,-97],
    why:'Yield nominal. Rujukan konteks — naik boleh headwind, tapi real yield lebih tulen.' },
  { id:'XAG', name:'Silver',     sym:'XAG/USD',  layer:3, base:0.66, geo:[35,-100],
    why:'Perak-tulen (dollar dibuang) vs gold-tulen. Sejajar = pengesahan kukuh untuk logam berharga.' },
];

// live state
const ST = { goldSpot:null, goldSpotChg:null, goldSpotT:0, _anchor:null,
  gc:null, si:null, tnx:null, dxy:null, fx:{}, ry:null, fxT:0, yT:0, ryT:0 };
const gHist = [];
let LAST = null;      // computed engine snapshot (verdict + per-node effects)

// ── fetch helpers ──
function withTimeout(p, ms){ return new Promise((res,rej)=>{ const t=setTimeout(()=>rej(new Error('timeout')),ms); p.then(v=>{clearTimeout(t);res(v);},e=>{clearTimeout(t);rej(e);}); }); }
async function jsonViaProxy(url, ms){ for(const w of PROXIES){ try{ const r=await withTimeout(fetch(w(url),{cache:'no-store'}),ms); if(!r.ok) continue; return await r.json(); }catch(e){} } throw new Error('proxies failed'); }
async function yf(sym, ms){
  let j=null;
  if(GATEWAY){ try{ const r=await withTimeout(fetch(GATEWAY+'/yf?symbol='+encodeURIComponent(sym),{cache:'no-store'}),ms||4500); if(r.ok){ const t=await r.json(); if(t&&t.chart&&t.chart.result&&t.chart.result[0]&&t.chart.result[0].meta) j=t; } }catch(e){} }
  if(!j) j=await jsonViaProxy(YF+encodeURIComponent(sym)+'?range=5d&interval=1d', ms||4500);
  const res=j&&j.chart&&j.chart.result&&j.chart.result[0]; if(!res||!res.meta) throw new Error('no meta');
  const m=res.meta; const price=m.regularMarketPrice; let prev=(m.chartPreviousClose!=null)?m.chartPreviousClose:m.previousClose;
  if((prev==null||prev<=0)&&res.indicators&&res.indicators.quote&&res.indicators.quote[0]){ const cl=res.indicators.quote[0].close||[]; for(const c of cl){ if(c!=null){ prev=c; break; } } }
  if(price==null||prev==null||prev<=0) throw new Error('bad px');
  return { price, prev, r: Math.log(price/prev) };
}
async function goldApi(sym, ms){ const r=await withTimeout(fetch(GAPI+sym,{cache:'no-store'}),ms||3500); if(!r.ok) throw new Error('goldapi'); const j=await r.json(); if(j.price==null) throw new Error('px'); return j.price; }
async function fredRealYield(ms){
  let j;
  if(GATEWAY){ const r=await withTimeout(fetch(GATEWAY+'/fred?series=DFII10',{cache:'no-store'}),ms||5000); if(!r.ok) throw new Error('gw fred '+r.status); j=await r.json(); }
  else if(RY_CONFIGURED){ j=await jsonViaProxy(fredUrl('DFII10'),ms||5000); }
  else return null;
  const obs=j&&j.observations; if(!obs||!obs.length) throw new Error('fred empty');
  const v=[]; for(const o of obs){ const x=parseFloat(o.value); if(!isNaN(x)) v.push(x); if(v.length>=2) break; }
  if(!v.length) throw new Error('no value');
  return { level:v[0], dChg:v.length>=2?(v[0]-v[1]):0 };
}

// ── math + engine ──
function erf(x){ const s=x<0?-1:1; x=Math.abs(x); const t=1/(1+0.3275911*x); const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x); return s*y; }
const normCdf=z=>0.5*(1+erf(z/Math.SQRT2));
const bp=r=>r*10000;
const fmtBp=r=>(r>=0?'+':'')+bp(r).toFixed(1);
const fmtZ=z=>(z>=0?'+':'')+z.toFixed(2);
const pTag=z=>'p'+Math.min(99,Math.max(1,Math.round(normCdf(z)*100))).toString().padStart(2,'0');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function decompose(){
  let sum=0,k=0; FX.forEach(x=>{ const v=ST.fx[x.sym]; if(v){ sum+=x.usdSign*v.r; k++; } });
  const fUsd = k>0 ? sum/N_CCY : null;
  let rXau=null;
  if(ST.goldSpot!=null && ST.gc && ST.gc.prev>0) rXau=Math.log(ST.goldSpot/ST.gc.prev);
  else if(ST.gc) rXau=ST.gc.r;
  const g=(rXau!=null&&fUsd!=null)?(rXau+fUsd):null;
  return { rXau, fUsd, g, fxCov:k };
}

// full engine snapshot: decomposition, z-scores, per-node effects, verdict
function computeState(){
  const d=decompose(); const { rXau, fUsd, g, fxCov } = d;
  const zRx=rXau!=null?rXau/VOL.xau:null;
  const zG =g!=null?g/VOL.g:null;
  const zF =fUsd!=null?fUsd/VOL.fusd:null;
  const zRy=ST.ry?ST.ry.dChg/VOL.ry:null;
  const causeBull = zRy!=null? -zRy : null;

  // per-node effect on gold: dir (+bull/-bear/0), mag (0..1), live
  const eff={};
  eff.RY  = ST.ry ? { dir:-Math.sign(ST.ry.dChg||0), mag:clamp(Math.abs(zRy)/2,0,1), live:true } : { dir:0,mag:0,live:false };
  eff.USD = (fUsd!=null) ? { dir:-Math.sign(fUsd), mag:clamp(Math.abs(zF)/2,0,1), live:true } : { dir:0,mag:0,live:false };
  eff.Y10 = ST.tnx ? { dir:-Math.sign(ST.tnx.r||0), mag:clamp(Math.abs(ST.tnx.r/VOL.tnx)/2,0,1)*0.7, live:true } : { dir:0,mag:0,live:false };
  if(ST.si && fUsd!=null){ const gAg=ST.si.r+fUsd; eff.XAG={ dir:Math.sign(gAg), mag:clamp(Math.abs(gAg/VOL.xag)/2,0,1), live:true, gAg }; }
  else eff.XAG={ dir:0,mag:0,live:false };
  eff.CCY={};
  FX.forEach(x=>{ const v=ST.fx[x.sym]; if(v){ const contrib=x.usdSign*v.r; eff.CCY[x.ccy]={ dir:-Math.sign(contrib), mag:clamp(Math.abs(contrib)/0.004/2,0,1)*0.55, live:true, r:v.r }; } else eff.CCY[x.ccy]={ dir:0,mag:0,live:false }; });

  // verdict from g
  let label='—', col=css('--dim');
  let dollarDriven=false;
  if(g!=null){
    dollarDriven = (Math.abs(zRx)>1.0 && Math.abs(zG)<0.5);
    if(dollarDriven){ label='GERAKAN DOLLAR'; col=css('--violet'); }
    else if(zG> 1.8){ label='GOLD-SENDIRI · BULLISH KUAT'; col=css('--green'); }
    else if(zG> 0.8){ label='GOLD-SENDIRI · BULLISH'; col=css('--green'); }
    else if(zG> 0.25){ label='GOLD-SENDIRI · CONDONG NAIK'; col='#8fd6b4'; }
    else if(zG<-1.8){ label='GOLD-SENDIRI · BEARISH KUAT'; col=css('--red'); }
    else if(zG<-0.8){ label='GOLD-SENDIRI · BEARISH'; col=css('--red'); }
    else if(zG<-0.25){ label='GOLD-SENDIRI · CONDONG TURUN'; col='#f7a3b3'; }
    else { label='NEUTRAL / SISI'; col=css('--gold'); }
  }
  let conf=null;
  if(g!=null){
    const ss=clamp(Math.abs(zG)/2,0,1);
    const have=(ST.goldSpot!=null?1:0)+(ST.gc?1:0)+fxCov; const ds=have/(2+7);
    let c=100*(0.55*ss+0.35*ds);

    conf=Math.round(clamp(c,5,94));
  }
  // normalized momentum for gauge (-1..1)
  const norm = zG!=null ? clamp(zG/2,-1,1) : 0;

  LAST = { rXau, fUsd, g, zRx, zG, zF, zRy, causeBull, fxCov, eff, label, col, conf, dollarDriven, norm };
  return LAST;
}

  const n=PRIMARY.length;
  PRIMARY.forEach((p,i)=>{
    const ang=(-90+i*(360/n))*Math.PI/180;
    const inf=p.base;
    const rest=minDim*0.15+(1-inf)*minDim*0.26;
    const rr=Math.max(12,minDim*0.020)+inf*(minDim*0.016);
    nodes.push({ ...p, hub:false, x:cx+Math.cos(ang)*rest, y:cy+Math.sin(ang)*rest, vx:0,vy:0, rest, r:rr, baseR:rr, seed:Math.random()*6.283, color:LAYER[p.layer].col });
  });

}
function usdNode(){ return nodes.find(n=>n.id==='USD'); }
function spawn(){
  particles=[];
  if(!LAST) return;
  for(let i=1;i<nodes.length;i++){
    const e=LAST.eff[nodes[i].id]||{mag:0,dir:0};
    const cnt=1+Math.round(e.mag*4);

}
const SPRING=0.02,FRICTION=0.85,CENTER_G=0.055,CENTER_O=0.0016,VMAX=7;
let drag=null,dragMoved=false,downAt=0;
function physics(){
  const rep=minDim*minDim*0.020;
  for(let i=0;i<nodes.length;i++){ const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){ const b=nodes[j];
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy; if(d2<1)d2=1;
      const d=Math.sqrt(d2),mind=(a.r+b.r)*1.9; let f=rep/d2; if(d<mind)f+=(mind-d)*0.06;
      const ux=dx/d,uy=dy/d; a.vx+=ux*f; a.vy+=uy*f; b.vx-=ux*f; b.vy-=uy*f; } }
  const hub=nodes[0];
  for(let i=1;i<nodes.length;i++){ const nd=nodes[i];
    let dx=nd.x-hub.x,dy=nd.y-hub.y,d=Math.hypot(dx,dy)||1;
    const f=SPRING*(d-nd.rest),ux=dx/d,uy=dy/d;
    nd.vx-=ux*f; nd.vy-=uy*f; hub.vx+=ux*f*0.12; hub.vy+=uy*f*0.12;
    nd.vx+=(cx-nd.x)*CENTER_O; nd.vy+=(cy-nd.y)*CENTER_O; }
  hub.vx+=(cx-hub.x)*CENTER_G; hub.vy+=(cy-hub.y)*CENTER_G;
  for(const nd of nodes){
    if(drag===nd){ nd.x=drag.tx; nd.y=drag.ty; nd.vx=0; nd.vy=0; continue; }
    nd.vx=clamp(nd.vx*FRICTION,-VMAX,VMAX); nd.vy=clamp(nd.vy*FRICTION,-VMAX,VMAX);
    nd.x+=nd.vx; nd.y+=nd.vy; const m=nd.r+6;
    if(nd.x<m){nd.x=m;nd.vx*=-0.4;} if(nd.x>W-m){nd.x=W-m;nd.vx*=-0.4;}
    if(nd.y<m){nd.y=m;nd.vy*=-0.4;} if(nd.y>H-m){nd.y=H-m;nd.vy*=-0.4;} }
}

function eGlobe(pt){ if(!LAST) return {dir:0,mag:0,live:false}; if(pt.ccy) return LAST.eff.CCY[pt.id]||{dir:0,mag:0,live:false}; return LAST.eff[pt.id]||{dir:0,mag:0,live:false}; }

// ── frame loop ──
function frame(){
  t+=0.016;
  if(view==='net'){ physics(); drawBackground(); drawNetwork(); }
  else { drawBackground(); if(globe){ if(!globeDrag && (Date.now()-globeTouchT)>4000) globe.yaw+=0.003; drawGlobe(); } }
  requestAnimationFrame(frame);
}

// ── interaction ──
function localXY(ev){ const r=cv.getBoundingClientRect(); const p=ev.touches?ev.touches[0]:ev; return [p.clientX-r.left,p.clientY-r.top,p.clientX,p.clientY]; }
function nodeAt(mx,my){ for(let i=nodes.length-1;i>=0;i--){ const nd=nodes[i]; if(Math.hypot(mx-nd.x,my-nd.y)<nd.r+7) return nd; } for(const c of ccyNodes){ if(Math.hypot(mx-c.x,my-c.y)<c.r+6) return {ccyNode:c}; } return null; }
function onDown(ev){ const xy=localXY(ev);
  if(view==='globe'){ globeDrag=true; globeLast=[xy[0],xy[1]]; globeTouchT=Date.now(); ev.preventDefault(); return; }
  const nd=nodeAt(xy[0],xy[1]); if(nd && !nd.ccyNode){ drag=nd; drag.tx=xy[0]; drag.ty=xy[1]; dragMoved=false; downAt=Date.now(); ev.preventDefault(); } }
function onMove(ev){ const xy=localXY(ev);
  if(view==='globe'){ if(globeDrag&&globe){ globe.yaw+=(xy[0]-globeLast[0])*0.006; globe.pitch=clamp(globe.pitch+(xy[1]-globeLast[1])*0.005,-1.3,1.3); globeLast=[xy[0],xy[1]]; globeTouchT=Date.now(); ev.preventDefault(); } return; }
  if(drag){ drag.tx=xy[0]; drag.ty=xy[1]; dragMoved=true; ev.preventDefault(); }
  else { const nd=nodeAt(xy[0],xy[1]); hovered=(nd&&!nd.ccyNode)?nd:null; cv.style.cursor=nd?'grab':'default'; if(nd) showTip(nd,xy[2],xy[3]); else if(!selected) tip.style.opacity=0; } }
function onUp(ev){
  if(view==='globe'){ globeDrag=false; globeTouchT=Date.now(); return; }
  if(drag){ if(!dragMoved && Date.now()-downAt<250){ selected=(selected===drag)?null:drag; selectRow(selected); if(selected){ const r=cv.getBoundingClientRect(); showTip(selected,r.left+selected.x,r.top+selected.y); } else tip.style.opacity=0; } drag=null; } }
cv.addEventListener('mousedown',onDown); window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
cv.addEventListener('wheel',ev=>{ if(view!=='globe'||!globe)return; ev.preventDefault(); globe.zoom=clamp(globe.zoom-ev.deltaY*0.0011,0.6,2.2); globeTouchT=Date.now(); },{passive:false});
cv.addEventListener('touchstart',onDown,{passive:false}); window.addEventListener('touchmove',onMove,{passive:false}); window.addEventListener('touchend',onUp);
let pinchD=0; cv.addEventListener('touchmove',ev=>{ if(view==='globe'&&globe&&ev.touches.length===2){ const dx=ev.touches[0].clientX-ev.touches[1].clientX,dy=ev.touches[0].clientY-ev.touches[1].clientY,d=Math.hypot(dx,dy); if(pinchD>0)globe.zoom=clamp(globe.zoom*(d/pinchD),0.6,2.2); pinchD=d; globeTouchT=Date.now(); ev.preventDefault(); } },{passive:false}); cv.addEventListener('touchend',()=>{pinchD=0;});

// ── data loops ──
function setStatus(t,col){ const e=document.getElementById('status'); if(e){ e.textContent=t; e.style.color=col||css('--dim'); } }
function stampStatus(){ const live=[ST.goldSpot!=null&&'gold',ST.gc&&'daily',(Object.keys(ST.fx).length>=5)&&'fx',ST.tnx&&'yield'].filter(Boolean); const p=n=>String(n).padStart(2,'0'); const d=new Date(); const ts=p(d.getHours())+':'+p(d.getMinutes()); if(live.length>=3)setStatus('LIVE · '+ts,css('--green')); else if(live.length)setStatus('SEPARA · '+ts,css('--gold')); else setStatus('OFFLINE',css('--red')); }
function refreshAll(){ computeState(); renderPanel(); spawn(); }

async function pollGold(){
  try{ const p=await goldApi('XAU'); if(ST.gc&&ST.gc.prev>0)ST.goldSpotChg=(p-ST.gc.prev)/ST.gc.prev*100; else if(ST._anchor)ST.goldSpotChg=(p-ST._anchor)/ST._anchor*100; if(!ST._anchor)ST._anchor=p; ST.goldSpot=p; ST.goldSpotT=Date.now(); }catch(e){}
  refreshAll(); stampStatus();
}
async function pollYahoo(){
  const jobs=[];
  jobs.push(yf('GC=F').then(x=>{ST.gc=x;}).catch(()=>{}));
  jobs.push(yf('SI=F').then(x=>{ST.si=x;}).catch(()=>{}));
  jobs.push(yf('^TNX').then(x=>{ST.tnx=x;}).catch(()=>{}));
  jobs.push(yf('DX-Y.NYB').then(x=>{ST.dxy=x;}).catch(()=>{}));
  FX.forEach(f=>jobs.push(yf(f.sym).then(x=>{ST.fx[f.sym]=x;}).catch(()=>{})));
  await Promise.all(jobs); ST.yT=Date.now(); ST.fxT=Date.now();
  const d=decompose(); if(d.g!=null){ gHist.push(d.g/VOL.g); if(gHist.length>180)gHist.shift(); }
  refreshAll(); stampStatus();
}
async function pollFred(){ try{ const ry=await fredRealYield(); if(ry){ ST.ry=ry; ST.ryT=Date.now(); } }catch(e){} refreshAll(); stampStatus(); }

function setView(v){ view=v; document.getElementById('vbNet').classList.toggle('active',v==='net'); document.getElementById('vbGlobe').classList.toggle('active',v==='globe');
  const show=id=>document.getElementById(id).style.display=''; const hide=id=>document.getElementById(id).style.display='none';
  if(v==='net'){ if(window.innerWidth>900){ show('decompBanner'); } show('concl'); } else { hide('decompBanner'); show('concl'); if(!globe)buildGlobe(); }
  tip.style.opacity=0;
}
document.getElementById('vbNet').addEventListener('click',()=>setView('net'));
document.getElementById('vbGlobe').addEventListener('click',()=>setView('globe'));
document.getElementById('mobtog').addEventListener('click',()=>document.getElementById('panel').classList.toggle('open'));

function tickClock(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); document.getElementById('clock').textContent=p(d.getUTCHours())+':'+p(d.getUTCMinutes())+' UTC'; }

function init(){
  resize(); computeState(); build(); buildGlobe(); buildDrivers(); renderPanel();
  tickClock(); setInterval(tickClock,20000);
  frame();
  pollYahoo(); pollGold(); pollFred();
  setInterval(pollGold,5000); setInterval(pollYahoo,45000); setInterval(pollFred,300000);
  window.addEventListener('resize',()=>{ resize(); build(); drawSpark(); });
}
init();
</script>
